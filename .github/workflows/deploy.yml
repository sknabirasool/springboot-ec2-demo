name: Deploy Spring Boot to EC2

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build Project
        run: mvn clean package -DskipTests

      - name: Verify Generated JAR
        run: ls -lh target/

      - name: Copy JAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "target/*.jar"
          target: "/home/ubuntu/springboot-app/"

      - name: Restart Spring Boot Application
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: false
          script: |
            echo "==============================="
            echo "Spring Boot Deployment Started"
            echo "==============================="

            mkdir -p /home/ubuntu/springboot-app

            cd /home/ubuntu/springboot-app

            echo "Current Files:"
            ls -lh

            echo "Stopping old application..."

            PID=$(pgrep -f ".jar")

            if [ -n "$PID" ]; then
              echo "Stopping Process ID: $PID"
              kill -9 $PID
              sleep 5
            else
              echo "No existing application found."
            fi

            echo "Starting new application..."

            nohup java -jar *.jar > app.log 2>&1 &

            sleep 10

            echo "Running Java Processes:"
            ps -ef | grep java

            echo "Application Log:"
            tail -20 app.log || true

            echo "==============================="
            echo "Deployment Completed Successfully"
            echo "==============================="